<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tank Game</title>
  </head>
  <body>
    <main id="game-shell">
      <aside id="side-hud" aria-label="Game status">
        <div class="hud-head">
          <div>
            <span class="hud-kicker">Mission</span>
            <strong>Tank OS</strong>
          </div>
          <span class="hud-live">Live</span>
        </div>
        <div class="hud-score">
          <span>Score</span>
          <strong data-hud="score">0</strong>
        </div>
        <div class="hud-xp">
          <div class="hud-xp-track" aria-hidden="true">
            <span data-hud="xp-bar"></span>
          </div>
          <div class="hud-xp-copy">
            <span>Level</span>
            <strong data-hud="level">1</strong>
            <small data-hud="xp-text">0 / 120 XP</small>
          </div>
        </div>
        <div class="hud-grid">
          <div>
            <span>Best</span>
            <strong data-hud="best">0</strong>
          </div>
          <div>
            <span>Wave</span>
            <strong data-hud="wave">1</strong>
          </div>
        </div>
        <div class="hud-row">
          <span>Multiplier</span>
          <strong data-hud="multiplier">x1</strong>
        </div>
        <div class="hud-row">
          <span>Zone</span>
          <strong data-hud="zone">Iron Yard</strong>
        </div>
        <div class="hud-gold">
          <span>Gold</span>
          <strong data-hud="gold">0</strong>
        </div>
        <button class="hud-shop-toggle" type="button" data-shop-toggle aria-expanded="false">
          <span>Store</span>
          <strong>Upgrades</strong>
        </button>
        <div class="hud-mods" data-hud="mods"></div>
      </aside>
      <section id="game-stage" aria-label="Battlefield">
        <div id="top-vitals" aria-label="Player armor">
          <span>Armor</span>
          <div class="health-meter" aria-hidden="true">
            <span data-hud="hp-bar"></span>
          </div>
          <strong data-hud="hp-top">0/0</strong>
        </div>
        <div id="app"></div>
      </section>
      <div class="shop-modal" data-shop-panel hidden role="dialog" aria-modal="true" aria-label="Permanent garage">
        <button class="shop-modal__backdrop" type="button" data-shop-close aria-label="Close store"></button>
        <div class="shop-modal__panel">
          <div class="store-frame">
            <header class="store-head">
              <div class="store-title">
                <span class="store-eyebrow">Garage</span>
                <strong>Loadout &amp; Permanent Upgrades</strong>
              </div>
              <div class="store-gold">
                <span>Wallet</span>
                <strong data-store-gold>0g</strong>
              </div>
              <button type="button" class="store-close" data-shop-close aria-label="Close store">×</button>
            </header>
            <nav class="store-tabs" role="tablist" aria-label="Store sections">
              <button type="button" role="tab" data-store-tab="stats" class="is-active" aria-selected="true">
                <span class="store-tab__name">Stats</span>
                <span class="store-tab__hint">Permanent upgrades</span>
              </button>
              <button type="button" role="tab" data-store-tab="classes" aria-selected="false">
                <span class="store-tab__name">Classes</span>
                <span class="store-tab__hint">5 chassis</span>
              </button>
              <button type="button" role="tab" data-store-tab="skins" aria-selected="false">
                <span class="store-tab__name">Skins</span>
                <span class="store-tab__hint">Active class livery</span>
              </button>
            </nav>
            <div class="store-body" data-store-body role="tabpanel"></div>
          </div>
        </div>
      </div>
    </main>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
